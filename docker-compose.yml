# Jaeger all-in-one for local OpenTelemetry demos (browser SDK → OTLP HTTP → Jaeger UI)
# UI: http://localhost:16686
# OTLP HTTP: http://localhost:4318  (Vite proxies /otlp → here)
services:
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: keyloop-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '16686:16686' # Jaeger UI
      - '4318:4318'   # OTLP HTTP
      - '4317:4317'   # OTLP gRPC
